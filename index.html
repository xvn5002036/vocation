        const JIAZI_60 = ["甲子", "乙丑", "丙寅", "丁卯", "戊辰", "己巳", "庚午", "辛未", "壬申", "癸酉", "甲戌", "乙亥", "丙子", "丁丑", "戊寅", "己卯", "庚辰", "辛巳", "壬午", "癸未", "甲申", "乙酉", "丙戌", "丁亥", "戊子", "己丑", "庚寅", "辛卯", "壬辰", "癸巳", "甲午", "乙未", "丙申", "丁酉", "戊戌", "己亥", "庚子", "辛丑", "壬寅", "癸卯", "甲辰", "乙巳", "丙午", "丁未", "戊申", "己酉", "庚戌", "辛亥", "壬子", "癸丑", "甲寅", "乙卯", "丙辰", "丁巳", "戊午", "己未", "庚申", "辛酉", "壬戌", "癸亥"];
        const STAR_MAPPING = { "子": "貪狼", "丑": "巨門", "寅": "祿存", "卯": "文曲", "辰": "廉貞", "巳": "武曲", "午": "破軍", "未": "武曲", "申": "廉貞", "酉": "文曲", "戌": "祿存", "亥": "巨門" };
        
        const HELUO_MAPPING = {
            "甲": { side: "東方", emperor: "青帝", qi: "九", planet: "蒼天", mountain: "泰山", master: "妙玄" },
            "乙": { side: "東方", emperor: "青帝", qi: "九", planet: "蒼天", mountain: "泰山", master: "妙玄" },
            "丙": { side: "南方", emperor: "赤帝", qi: "三", planet: "赤天", mountain: "南嶽", master: "暢玄" },
            "丁": { side: "南方", emperor: "赤帝", qi: "三", planet: "赤天", mountain: "南嶽", master: "暢玄" }, // 1987 基準
            "戊": { side: "中央", emperor: "黃帝", qi: "一", planet: "昊天", mountain: "嵩山", master: "靈玄" },
            "己": { side: "中央", emperor: "黃帝", qi: "一", planet: "昊天", mountain: "嵩山", master: "靈玄" },
            "庚": { side: "西方", emperor: "白帝", qi: "七", planet: "浩天", mountain: "華山", master: "真玄" },

            "壬": { side: "北方", emperor: "黑帝", qi: "五", planet: "玄天", mountain: "恆山", master: "洞玄" },
            "癸": { side: "北方", emperor: "黑帝", qi: "五", planet: "玄天", mountain: "恆山", master: "洞玄" }
        };

        const YANG_HOURS = ["子時", "寅時", "辰時", "午時", "申時", "戌時"];

        function App() {
            const [tab, setTab] = useState('home');
            const [menuOpen, setMenuOpen] = useState(false);
            const [form, setForm] = useState({ name: '', gender: '男生', calendar: 'solar', year: '1987', month: '4', day: '10', hour: '申時' });
            const [result, setResult] = useState(null);
            const [isSpinning, setIsSpinning] = useState(false);
            const [catalogQuery, setCatalogQuery] = useState('');

            const getMarshalIdx = (off) => {
                const g = Math.floor(off / 4);
                if (off >= 48) return (18 + (g - 12)) % 43; 
                if (g >= 3 && off < 48) return (1 + g + 1) % 43; 
                return (1 + g) % 43; 
            };

            const handleAction = () => {
                if (!form.name.trim()) return;
                setIsSpinning(true);
                setTimeout(() => {
                    const yr = parseInt(form.year) || 1984;
                    let off = (yr - 1984) % 60;
                    if (off < 0) off += 60;
                    const jiazi = JIAZI_60[off];
                    const m = MARSHAL_CANON[getMarshalIdx(off)];
                    const duling = YANG_HOURS.includes(form.hour) ? "左" : "右";
                    const hl = HELUO_MAPPING[jiazi[0]];
                    
                    const output = {
                        id: Date.now(), ...form, jiazi, marshal: m.name, prefix: m.prefix, rk: m.rank,
                        al: m.altar, jn: m.jing, zh: m.zhi, dt: m.duty, pl: m.palace, office: m.office, rolePrefix: m.rolePrefix,
                        st: STAR_MAPPING[jiazi[1]], hl, dl: duling,
                        fullRole: form.gender === '男生' ? `${m.rolePrefix}${m.palace}仙官之職` : `封受${m.palace}淑人之位`,
                        timeStr: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                    };
                    setResult(output);
                    setTab('result');
                    setIsSpinning(false);
                }, 600);
            };

            return (
                <div className="flex flex-col min-h-screen font-black">
                    <header className="sticky top-0 z-50 bg-black border-b border-amber-900/30 px-6 py-4 flex justify-between items-center shadow-xl no-print">
                        <button onClick={() => setMenuOpen(true)} className="p-2 text-amber-500 active:scale-75">選單</button>
                        <h1 className="tracking-widest text-amber-100 italic">正一職官法典系統</h1>
                        <div className="w-8"></div>
                    </header>

                    {menuOpen && (
                        <div className="fixed inset-0 z-[100] flex">
                            <div className="absolute inset-0 bg-black/90 backdrop-blur-sm" onClick={() => setMenuOpen(false)}></div>
                            <div className="relative w-64 bg-[#0a0a0a] border-r border-amber-900/40 h-full p-8 flex flex-col shadow-2xl animate-in slide-in-from-left duration-300">
                                <h2 className="text-amber-500 italic mb-10 border-b border-amber-900/20 pb-4">系統目錄</h2>
                                <nav className="space-y-6 flex-1 font-sans">
                                    <button onClick={() => {setTab('home'); setMenuOpen(false);}} className="w-full text-left p-4 rounded-xl border border-zinc-900 text-zinc-400">錄籍登記</button>
                                    <button onClick={() => {setTab('catalog'); setMenuOpen(false);}} className="w-full text-left p-4 rounded-xl border border-zinc-900 text-zinc-400">映射全錄</button>
                                </nav>
                            </div>
                        </div>
                    )}

                    <main className="max-w-md mx-auto px-4 py-6 flex-1 w-full pb-24">
                        {tab === 'home' && (
                            <div className="space-y-6 animate-in fade-in duration-500">
                                <div className="bg-[#0a0a0a] rounded-2xl p-6 border border-zinc-900 shadow-2xl relative overflow-hidden">
                                    <div className="flex justify-between items-center mb-6 border-b border-zinc-900 pb-4 font-sans">
                                        <span className="tracking-widest text-amber-100 uppercase italic">錄 籍 申 奏</span>
                                        <div className="flex bg-black p-0.5 rounded-lg border border-zinc-800">
                                            {['solar', 'lunar'].map(m => (
                                                <button key={m} onClick={() => setForm({...form, calendar: m})} className={`px-4 py-1.5 rounded-md transition-all ${form.calendar === m ? 'bg-amber-900 text-white' : 'text-zinc-700'}`}>{m === 'solar' ? '國' : '農'}</button>
                                            ))}
                                        </div>
                                    </div>

                                    <div className="space-y-6 font-sans text-[14px]">
                                        <div className="space-y-1">
                                            <label className="text-zinc-600 uppercase tracking-widest ml-1 italic">Disciple Name</label>
                                            <input className="w-full bg-black border border-zinc-800 rounded-xl py-3 px-4 text-amber-50 outline-none focus:border-amber-600 shadow-inner" placeholder="姓名" value={form.name} onChange={e => setForm({...form, name: e.target.value})} />
                                        </div>
                                        <div className="grid grid-cols-2 gap-4">
                                            {['男生', '女生'].map(g => (
                                                <button key={g} onClick={() => setForm({...form, gender: g})} className={`py-4 rounded-xl border transition-all ${form.gender === g ? 'bg-amber-950/40 border-amber-600 text-amber-100 shadow-xl' : 'bg-black border-zinc-900 text-zinc-700'}`}>{g}</button>
                                            ))}
                                        </div>
                                        <div className="grid grid-cols-3 gap-3 text-center">
                                            <div className="bg-black p-3 rounded-xl border border-zinc-800">
                                                <label className="block text-zinc-700 mb-1">西元</label>
                                                <input type="number" className="w-full bg-transparent text-amber-500 text-center outline-none" value={form.year} onChange={e => setForm({...form, year: e.target.value})} />
                                            </div>
                                            <div className="bg-black p-3 rounded-xl border border-zinc-800">
                                                <label className="block text-zinc-700 mb-1">月份</label>
                                                <select className="w-full bg-transparent text-amber-100 appearance-none outline-none text-center" value={form.month} onChange={e => setForm({...form, month: e.target.value})}>{Array.from({length: 12}, (_, i) => i + 1).map(m => <option key={m} value={m}>{m}</option>)}</select>
                                            </div>
                                            <div className="bg-black p-3 rounded-xl border border-zinc-800">
                                                <label className="block text-zinc-700 mb-1">日期</label>
                                                <select className="w-full bg-transparent text-amber-100 appearance-none outline-none text-center" value={form.day} onChange={e => setForm({...form, day: e.target.value})}>{Array.from({length: 31}, (_, i) => i + 1).map(d => <option key={d} value={d}>{d}</option>)}</select>
                                            </div>
                                        </div>
                                        <div className="grid grid-cols-4 gap-2">
                                            {["子時", "丑時", "寅時", "卯時", "辰時", "巳時", "午時", "未時", "申時", "酉時", "戌時", "亥時"].map(s => (
                                                <button key={s} onClick={() => setForm({...form, hour: s})} className={`py-2 rounded-xl border transition-all ${form.hour === s ? 'bg-amber-600 text-black border-amber-400 scale-105' : 'bg-black/40 border-zinc-900 text-zinc-700'}`}>{s}</button>
                                            ))}
                                        </div>
                                    </div>

                                    <button onClick={handleAction} disabled={!form.name || isSpinning} className={`w-full mt-10 py-5 rounded-2xl tracking-[0.3em] transition-all shadow-2xl font-sans ${(!form.name || isSpinning) ? 'bg-zinc-900 text-zinc-800' : 'bg-gradient-to-r from-amber-600 via-amber-400 to-amber-600 text-black active:scale-95'}`}>
                                        {isSpinning ? "申 奏 中..." : "定 格 分 發"}
                                    </button>
                                </div>
                            </div>
                        )}

                        {tab === 'result' && result && (
                            <div className="animate-in zoom-in-95 duration-700 pb-20">
                                <div className="ordination-paper rounded-2xl p-0.5 gold-border shadow-2xl">
                                    <div className="bg-[#050505] p-6 relative rounded-2xl border border-amber-900/10">
                                        <div className="text-center mb-10 border-b border-amber-900/20 pb-8 font-serif">
                                            <div className="inline-block px-10 py-1.5 border border-amber-600/30 mb-8 font-sans"><span className="text-amber-500 tracking-[1.5em] uppercase italic">萬法宗壇</span></div>
                                            <h2 className="font-black text-amber-100 tracking-[0.3em] drop-shadow-2xl font-serif italic">職官分發告牒</h2>
                                        </div>

                                        <div className="space-y-12 leading-relaxed text-zinc-300 px-2 font-black">
                                            <div className="space-y-8">
                                                <p className="flex flex-col space-y-2">
                                                    <span className="text-amber-600 tracking-widest opacity-60 italic uppercase">一 奏 受</span>
                                                    {/* 第一行前綴完全動態化 */}
                                                    <span className="text-white pl-4 border-l-2 border-amber-900/40 py-1 leading-loose tracking-widest">
                                                        太上三五都功經籙{result.fullRole}
                                                    </span>
                                                </p>

                                                <p className="flex flex-col space-y-2">
                                                    <span className="text-amber-600 tracking-widest opacity-60 italic">一 補 充</span>
                                                    {/* 第二行官署完全動態化 */}
                                                    <span className="text-zinc-200 pl-4 border-l-2 border-amber-900/40 py-1">
                                                        {result.office}兼{result.dt}為任
                                                    </span>
                                                </p>

                                                <p className="flex flex-col space-y-2">
                                                    <span className="text-amber-600 tracking-widest opacity-60 italic">一 奏 立</span>
                                                    <span className="text-zinc-200 pl-4 border-l-2 border-amber-900/40 py-1 font-black">
                                                        {result.al}壇{result.jn}靖
                                                    </span>
                                                </p>

                                                <p className="flex flex-col space-y-2">
                                                    <span className="text-amber-600 tracking-widest opacity-60 italic">一 泰玄都省正一平炁宮</span>
                                                    <span className="text-zinc-200 pl-4 border-l-2 border-amber-900/40 py-1 font-black">
                                                        係 天師{result.zh}治{result.dl}都領炁
                                                    </span>
                                                </p>
                                                
                                                <div className="bg-[#0a0a0a] p-6 rounded-2xl border border-zinc-900 shadow-inner">
                                                    <div className="text-zinc-700 uppercase tracking-widest mb-4 font-sans italic opacity-40 text-[12px]">元命炁數 / 星君守護</div>
                                                    {/* 五嶽與先生號完全動態化 */}
                                                    <p className="text-amber-500 leading-loose tracking-widest">
                                                        {result.hl.qi}炁君{result.hl.planet}三五步罡元命應{result.hl.master}先生<br/>
                                                        {result.hl.mountain}{result.hl.emperor}{result.hl.qi}炁真人<br/>
                                                        配屬本命北斗{result.st}星君
                                                    </p>
                                                </div>

                                                <p className="flex flex-col space-y-4 pt-10 border-t border-zinc-900/50">
                                                    <span className="text-amber-600 tracking-widest uppercase opacity-60 italic">一 奏 撥</span>
                                                    <span className="text-amber-100 pl-4 py-2 drop-shadow-xl tracking-widest leading-normal">
                                                        {result.prefix}{result.marshal}麾下
                                                    </span>
                                                </p>
                                            </div>
                                            <div className="text-center text-amber-900/40 mt-16 pt-10 border-t border-zinc-900/50 tracking-[0.4em] italic">核於 {result.timeStr} • 萬神咸聽</div>
                                        </div>

                                        <div className="mt-16 flex flex-col space-y-4 no-print font-sans">
                                            <button onClick={() => window.print()} className="w-full bg-gradient-to-b from-amber-500 to-amber-700 text-black py-4 rounded-xl active:scale-95 shadow-2xl">列 印 牒 文</button>
                                            <button onClick={() => setTab('home')} className="w-full bg-zinc-900/50 text-zinc-600 py-3.5 rounded-xl active:scale-95 tracking-widest italic border border-zinc-900">返回登錄</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {tab === 'catalog' && (
                            <div className="animate-in slide-in-from-right duration-500 pb-40 space-y-6 text-[14px]">
                                <h2 className="italic border-l-4 border-amber-600 pl-4 tracking-widest text-amber-100 font-serif">法統全錄映射 (可搜西元)</h2>
                                <div className="relative font-sans">
                                    <input className="w-full bg-black border border-zinc-900 rounded-xl py-3 px-4 font-bold text-amber-50 shadow-2xl outline-none focus:border-amber-600" placeholder="搜尋：1987、丁卯、或元帥名..." value={catalogQuery} onChange={e => setCatalogQuery(e.target.value)} />
                                </div>
                                <div className="bg-[#0a0a0a] rounded-2xl border border-zinc-900 p-4 shadow-2xl font-black">
                                    <div className="grid grid-cols-2 gap-3 h-[70vh] overflow-y-auto custom-scrollbar px-1">
                                        {JIAZI_60.map((name, index) => {
                                            const cycleYear = 1984 + index;
                                            const m = MARSHAL_CANON[getMarshalIdx(index)];
                                            if (catalogQuery && 
                                                !name.includes(catalogQuery) && 
                                                !cycleYear.toString().includes(catalogQuery) &&
                                                !m.name.includes(catalogQuery)) return null;

                                            const isGroup = index % 4 === 0;
                                            return (
                                                <div key={name} className={`bg-zinc-950/40 p-5 rounded-3xl border border-zinc-900/60 flex flex-col items-center justify-center space-y-2 group active:bg-amber-950/20 transition-all ${isGroup ? 'border-l-2 border-l-amber-600/40' : ''}`}>
                                                    <div className="flex justify-between w-full px-1 items-center">
                                                        <span className="text-zinc-800 italic">#{m.rank}</span>
                                                        <span className="text-zinc-500">{cycleYear}</span>
                                                    </div>
                                                    <span className="text-zinc-400 group-hover:text-amber-100">{name}</span>
                                                    <div className="text-center font-serif pt-2 border-t border-zinc-900/50 w-full">
                                                        <span className="block font-black text-amber-600 italic tracking-tighter uppercase">{m.name}</span>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    <nav className="fixed bottom-0 left-0 right-0 bg-black border-t border-amber-900/20 p-4 pb-8 z-50 max-w-md mx-auto rounded-t-[2.5rem] shadow-2xl no-print font-sans">
                        <div className="flex justify-around items-center">
                            <button onClick={() => setTab('home')} className={`flex flex-col items-center space-y-1 px-10 transition-all relative ${tab === 'home' || tab === 'result' ? 'text-amber-400 scale-110' : 'text-zinc-700'}`}>
                                <span className="uppercase tracking-[0.2em]">錄籍登記</span>
                                {(tab === 'home' || tab === 'result') && <div className="absolute -top-3 w-1.5 h-1.5 bg-amber-500 rounded-full animate-pulse shadow-[0_0_10px_#f59e0b]" />}
                            </button>
                            <button onClick={() => setTab('catalog')} className={`flex flex-col items-center space-y-1 px-10 transition-all relative ${tab === 'catalog' ? 'text-amber-400 scale-110' : 'text-zinc-700'}`}>
                                <span className="uppercase tracking-[0.2em]">映射全錄</span>
                                {(tab === 'catalog') && <div className="absolute -top-3 w-1.5 h-1.5 bg-amber-500 rounded-full animate-pulse shadow-[0_0_10px_#f59e0b]" />}
                            </button>
                        </div>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
