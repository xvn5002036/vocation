<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>正一萬法宗壇職官法典系統</title>
    <!-- 引入 Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 React 與 Babel CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- 引入 Lucide 圖標庫 -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #010101;
            color: #e5d5b0;
            font-family: 'Noto Serif TC', serif;
            -webkit-font-smoothing: antialiased;
        }
        .custom-scrollbar::-webkit-scrollbar { width: 3px; background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1a1a1a; border-radius: 10px; }
        input, select { background: black !important; border-color: #27272a !important; }
        .ordination-bg {
            background: radial-gradient(circle at center, #0a0a0a 0%, #000000 100%);
        }
        @media print {
            .no-print { display: none !important; }
            body { background: white !important; color: black !important; }
            .bg-black, .bg-[#0a0a0a], .bg-[#050505] { background: white !important; border: 2px solid #8a2318 !important; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;

        // --- 核心數據：四十三位元帥法統 ---
        const MARSHAL_CANON = [
            { rank: 1, name: "王靈官", prefix: "都天糾察", palace: "都天府", duty: "通天糾察事", zhi: "陽平治", altar: "玉堂贊化壇", jing: "降真集靈靖" },
            { rank: 2, name: "馬元帥", prefix: "斗口靈官", palace: "善仙宮", duty: "三界便宜事", zhi: "葛璝治", altar: "三界集神壇", jing: "洞真自然靖" }, 
            { rank: 3, name: "趙元帥", prefix: "玄壇真君", palace: "玄壇府", duty: "金輪執法事", zhi: "鶴鳴治", altar: "玄一守道壇", jing: "凝神志道靖" },
            { rank: 4, name: "溫元帥", prefix: "地祇主將", palace: "玉京閣", duty: "幽冥督察事", zhi: "女几治", altar: "紫微承慶壇", jing: "太上玄妙靖" }, 
            { rank: 5, name: "關元帥", prefix: "義勇武安", palace: "崇寧殿", duty: "義勇巡查事", zhi: "上清治", altar: "武德演法壇", jing: "威靈感應靖" },
            { rank: 6, name: "殷元帥", prefix: "至德太歲", palace: "太歲府", duty: "至德考較事", zhi: "蓋竹治", altar: "太極宣化壇", jing: "延生保命靖" }, 
            { rank: 7, name: "岳元帥", prefix: "精忠武穆", palace: "精忠宮", duty: "兵戈鎮壓事", zhi: "雲台治", altar: "忠義護國壇", jing: "靖難平亂靖" },
            { rank: 8, name: "康元帥", prefix: "仁聖元帥", palace: "仁聖府", duty: "生靈保命事", zhi: "浕口治", altar: "慈悲度世壇", jing: "保生益壽靖" },
            { rank: 9, name: "辛元帥", prefix: "雷霆判官", palace: "雷霆府", duty: "電火威權事", zhi: "后城治", altar: "雷音演教壇", jing: "神霄輔化靖" },
            { rank: 10, name: "鄧元帥", prefix: "律令大神", palace: "律令司", duty: "五雷執行事", zhi: "公慕治", altar: "五雷執法壇", jing: "震威攝邪靖" },
            { rank: 11, name: "張元帥", prefix: "南斗星君", palace: "南斗宮", duty: "延生註錄事", zhi: "平岡治", altar: "長生注壽壇", jing: "玄樞密運靖" },
            { rank: 12, name: "陶元帥", prefix: "北斗星君", palace: "北斗閣", duty: "消災解厄事", zhi: "主簿治", altar: "北斗禳災壇", jing: "星輝護體靖" },
            { rank: 13, name: "龐元帥", prefix: "混元使者", palace: "混元觀", duty: "陰陽判斷事", zhi: "玉堂治", altar: "混元一氣壇", jing: "太初歸真靖" },
            { rank: 14, name: "劉元帥", prefix: "紫微大將", palace: "紫微宮", duty: "星辰運作事", zhi: "北邙治", altar: "星漢昭輝壇", jing: "紫府神光靖" },
            { rank: 15, name: "苟元帥", prefix: "天樞使者", palace: "天樞院", duty: "樞機密運事", zhi: "縑山治", altar: "天樞密旨壇", jing: "玄機內運靖" },
            { rank: 16, name: "畢元帥", prefix: "神霄判官", palace: "神霄殿", duty: "火符傳遞事", zhi: "渠亭治", altar: "神霄火雲壇", jing: "流金火鈴靖" },
            { rank: 17, name: "李元帥", prefix: "鎮元大將", palace: "鎮元觀", duty: "地脈安鎮事", zhi: "稠稉治", altar: "地靈穩靖壇", jing: "安土地祇靖" },
            { rank: 18, name: "高元帥", prefix: "宣化真君", palace: "宣化府", duty: "教門弘法事", zhi: "真多治", altar: "正法演音壇", jing: "弘道宣化靖" },
            { rank: 19, name: "周元帥", prefix: "保仙元帥", palace: "保仙閣", duty: "境內巡察事", zhi: "昌利治", altar: "太平護民壇", jing: "巡遊糾察靖" },
            { rank: 20, name: "謝元帥", palace: "廣澤宮", duty: "江河潤澤事", zhi: "棣上治", altar: "水雲降澤壇", jing: "洪恩廣佈靖" },
            { rank: 21, name: "任元帥", palace: "無極院", duty: "乾坤調和事", zhi: "湧泉治", altar: "兩儀交泰壇", jing: "無為自然靖" },
            { rank: 22, name: "寧元帥", palace: "慈航殿", duty: "濟度沉淪事", zhi: "本竹治", altar: "慈航渡厄壇", jing: "救苦尋聲靖" },
            { rank: 23, name: "藍元帥", palace: "長生觀", duty: "藥道採集事", zhi: "白鹿治", altar: "百草靈丹壇", jing: "長生保命靖" },
            { rank: 24, name: "朱元帥", palace: "忠義宮", duty: "綱常維護事", zhi: "岡坻治", altar: "倫常演禮壇", jing: "守信不二靖" },
            { rank: 25, name: "鄭元帥", palace: "威靈府", duty: "妖邪掃除事", zhi: "蒙秦治", altar: "威靈顯應壇", jing: "伏魔除暴靖" },
            { rank: 26, name: "金元帥", palace: "開元殿", duty: "金石鑄造事", zhi: "陽平治", altar: "精金淬煉壇", jing: "法器莊嚴靖" },
            { rank: 27, name: "黃元帥", palace: "坤元府", duty: "厚德載物事", zhi: "鹿堂治", altar: "后土坤載壇", jing: "承天效法靖" },
            { rank: 28, name: "曾元帥", palace: "三元觀", duty: "考校功過事", zhi: "鶴鳴治", altar: "三官考較壇", jing: "賜福赦罪靖" },
            { rank: 29, name: "孟元帥", palace: "武聖殿", duty: "甲兵操練事", zhi: "女几治", altar: "神武衛道壇", jing: "威鎮海岱靖" },
            { rank: 30, name: "鐵元帥", palace: "剛義府", duty: "五金司掌事", zhi: "上清治", altar: "剛正不阿壇", jing: "金光護法靖" },
            { rank: 31, name: "苟元帥", palace: "太清觀", duty: "道德傳承事", zhi: "蓋竹治", altar: "玄德演教壇", jing: "清靜開道靖" },
            { rank: 32, name: "玉元帥", palace: "玉虛宮", duty: "玄通感應事", zhi: "雲台治", altar: "玉虛朝聖壇", jing: "感應道交靖" },
            { rank: 33, name: "石元帥", palace: "石靈殿", duty: "山嶽鎮守事", zhi: "浕口治", altar: "五嶽朝天壇", jing: "盤石安穩靖" },
            { rank: 34, name: "常元帥", palace: "常存閣", duty: "恆久法界事", zhi: "后城治", altar: "永恆法脈壇", jing: "不生不滅靖" },
            { rank: 35, name: "何元帥", palace: "三教院", duty: "儒道釋和事", zhi: "公慕治", altar: "三教並圓壇", jing: "大同世界靖" },
            { rank: 36, name: "姚元帥", palace: "廣德宮", duty: "施予福報事", zhi: "平岡治", altar: "大德廣生壇", jing: "福緣廣佈靖" },
            { rank: 37, name: "伍元帥", palace: "威猛殿", duty: "伏虎降龍事", zhi: "主簿治", altar: "剛勇降魔壇", jing: "威武不屈靖" },
            { rank: 38, name: "卜元帥", palace: "玄機閣", duty: "易理推衍事", zhi: "玉堂治", altar: "先天術數壇", jing: "河洛神機靖" },
            { rank: 39, name: "雷元帥", palace: "雷鳴府", duty: "九天震動事", zhi: "北邙治", altar: "九天雷祖壇", jing: "響雷破幽靖" },
            { rank: 40, name: "白元帥", palace: "太白觀", duty: "西方肅殺事", zhi: "縑山治", altar: "白金肅靜壇", jing: "利劍斬妖靖" },
            { rank: 41, name: "沈元帥", palace: "隱元殿", duty: "遁法施行事", zhi: "渠亭治", altar: "奇門遁甲壇", jing: "隱顯莫測靖" },
            { rank: 42, name: "郭元帥", palace: "通明宮", duty: "天門守衛事", zhi: "稠稉治", altar: "通明上相壇", jing: "守衛仙都靖" },
            { rank: 43, name: "王高元帥", palace: "萬福府", duty: "群仙考較事", zhi: "真多治", altar: "萬壽無疆壇", jing: "福祿壽星靖" }
        ];

        const JIAZI_60 = ["甲子", "乙丑", "丙寅", "丁卯", "戊辰", "己巳", "庚午", "辛未", "壬申", "癸酉", "甲戌", "乙亥", "丙子", "丁丑", "戊寅", "己卯", "庚辰", "辛巳", "壬午", "癸未", "甲申", "乙酉", "丙戌", "丁亥", "戊子", "己丑", "庚寅", "辛卯", "壬辰", "癸巳", "甲午", "乙未", "丙申", "丁酉", "戊戌", "己亥", "庚子", "辛丑", "壬寅", "癸卯", "甲辰", "乙巳", "丙午", "丁未", "戊申", "己酉", "庚戌", "辛亥", "壬子", "癸丑", "甲寅", "乙卯", "丙辰", "丁巳", "戊午", "己未", "庚申", "辛酉", "壬戌", "癸亥"];

        const STAR_MAPPING = { "子": "貪狼", "丑": "巨門", "寅": "祿存", "卯": "文曲", "辰": "廉貞", "巳": "武曲", "午": "破軍", "未": "武曲", "申": "廉貞", "酉": "文曲", "戌": "祿存", "亥": "巨門" };
        const HELUO_MAPPING = {
            "甲": { side: "東方", emperor: "青帝", qi: "九", planet: "蒼天" }, "乙": { side: "東方", emperor: "青帝", qi: "九", planet: "蒼天" },
            "丙": { side: "南方", emperor: "赤帝", qi: "三", planet: "赤天" }, "丁": { side: "南方", emperor: "赤帝", qi: "三", planet: "赤天" },
            "戊": { side: "中央", emperor: "黃帝", qi: "一", planet: "昊天" }, "己": { side: "中央", emperor: "黃帝", qi: "一", planet: "昊天" },
            "庚": { side: "西方", emperor: "白帝", qi: "七", planet: "浩天" }, "辛": { side: "西方", emperor: "白帝", qi: "七", planet: "浩天" },
            "壬": { side: "北方", emperor: "黑帝", qi: "五", planet: "玄天" }, "癸": { side: "北方", emperor: "黑帝", qi: "五", planet: "玄天" }
        };

        const YANG_HOURS = ["子時", "寅時", "辰時", "午時", "申時", "戌時"];

        function App() {
            const [tab, setTab] = useState('home');
            const [menuOpen, setMenuOpen] = useState(false);
            const [history, setHistory] = useState([]);
            const [isSpinning, setIsSpinning] = useState(false);
            const [catalogQuery, setCatalogQuery] = useState('');
            const [form, setForm] = useState({ name: '', gender: '男', calendar: 'solar', year: '1987', month: '4', day: '10', hour: '申時' });
            const [result, setResult] = useState(null);

            const getMarshalIdx = (off) => {
                const g = Math.floor(off / 4);
                if (off >= 48) return (18 + (g - 12)) % 43; // 1972 壬子
                if (g >= 3 && off < 48) return (1 + g + 1) % 43; // 1998 殷帥
                return (1 + g) % 43; // 1987 馬帥
            };

            const handleAction = () => {
                if (!form.name.trim()) return;
                setIsSpinning(true);
                setTimeout(() => {
                    const yr = parseInt(form.year) || 1984;
                    let off = (yr - 1984) % 60;
                    if (off < 0) off += 60;
                    const jiazi = JIAZI_60[off];
                    const m = MARSHAL_CANON[getMarshalIdx(off)];
                    const duling = YANG_HOURS.includes(form.hour) ? "左" : "右";
                    const hl = HELUO_MAPPING[jiazi[0]];
                    const palaceBase = m.palace.replace(/[宮府殿觀閣院司]/g, '');
                    const output = {
                        id: Date.now(), ...form, jiazi, marshal: m.name, prefix: m.prefix, rk: m.rank,
                        al: m.altar, jn: m.jing, zh: m.zhi, dt: m.duty,
                        st: STAR_MAPPING[jiazi[1]], hl, dl: duling,
                        fullRole: form.gender === '男' ? `紫府掌${palaceBase}仙官之職` : `封受${palaceBase}仙人之位`,
                        timeStr: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                    };
                    setResult(output);
                    setHistory(p => [output, ...p]);
                    setTab('result');
                    setIsSpinning(false);
                }, 600);
            };

            return (
                <div className="min-h-screen">
                    {/* Header */}
                    <header className="sticky top-0 z-50 bg-black/95 border-b border-amber-900/30 px-4 py-4 flex justify-between items-center backdrop-blur-md shadow-xl no-print">
                        <button onClick={() => setMenuOpen(true)} className="p-2 text-amber-500 active:scale-75"><i data-lucide="menu"></i></button>
                        <h1 className="text-base font-black tracking-widest text-amber-100 italic">正一職官法典系統</h1>
                        <div className="w-8"></div>
                    </header>

                    {/* Sidebar */}
                    {menuOpen && (
                        <div className="fixed inset-0 z-[100] flex">
                            <div className="absolute inset-0 bg-black/90 backdrop-blur-sm" onClick={() => setMenuOpen(false)}></div>
                            <div className="relative w-64 bg-[#0a0a0a] border-r border-amber-900/40 h-full p-8 flex flex-col shadow-2xl animate-in slide-in-from-left duration-300">
                                <h2 className="text-amber-500 font-black text-xl italic mb-10 border-b border-amber-900/20 pb-4">系統目錄</h2>
                                <nav className="space-y-6 flex-1">
                                    <button onClick={() => {setTab('home'); setMenuOpen(false);}} className={`w-full flex items-center space-x-4 p-4 rounded-xl border transition-all ${tab === 'home' ? 'bg-amber-950/40 border-amber-500 text-amber-100 shadow-lg' : 'border-zinc-900 text-zinc-600'}`}>錄籍登記</button>
                                    <button onClick={() => {setTab('catalog'); setMenuOpen(false);}} className={`w-full flex items-center space-x-4 p-4 rounded-xl border transition-all ${tab === 'catalog' ? 'bg-amber-950/40 border-amber-500 text-amber-100 shadow-lg' : 'border-zinc-900 text-zinc-600'}`}>映射全錄</button>
                                </nav>
                                <p className="text-[10px] text-zinc-700 italic border-t border-zinc-900 pt-4">© 萬法宗壇數位典藏</p>
                            </div>
                        </div>
                    )}

                    <main className="max-w-md mx-auto px-5 py-8">
                        {tab === 'home' && (
                            <div className="space-y-8 animate-in fade-in duration-500">
                                <div className="bg-[#0a0a0a] rounded-3xl p-8 border border-zinc-900 shadow-2xl relative overflow-hidden">
                                    <div className="flex justify-between items-center mb-8 border-b border-zinc-900 pb-5">
                                        <h2 className="text-xs font-black tracking-widest text-amber-100 uppercase italic">錄 籍 申 奏</h2>
                                        <div className="flex bg-black p-0.5 rounded-lg border border-zinc-800">
                                            {['solar', 'lunar'].map(m => (
                                                <button key={m} onClick={() => setForm({...form, calendar: m})} className={`px-4 py-1.5 rounded-md text-xs font-black transition-all ${form.calendar === m ? 'bg-amber-900 text-white' : 'text-zinc-700'}`}>{m === 'solar' ? '國' : '農'}</button>
                                            ))}
                                        </div>
                                    </div>

                                    <div className="space-y-8">
                                        <div className="space-y-2">
                                            <label className="text-xs font-black text-zinc-600 uppercase tracking-widest italic ml-1">Disciple Name</label>
                                            <input className="w-full bg-black border border-zinc-800 rounded-2xl py-5 px-6 font-bold text-xl text-amber-50 outline-none focus:border-amber-600 shadow-inner" placeholder="請輸入姓名" value={form.name} onChange={e => setForm({...form, name: e.target.value})} />
                                        </div>
                                        <div className="grid grid-cols-2 gap-5">
                                            {['男', '女'].map(g => (
                                                <button key={g} onClick={() => setForm({...form, gender: g})} className={`py-5 rounded-2xl font-black text-base border transition-all ${form.gender === g ? 'bg-amber-950/40 border-amber-600 text-amber-100' : 'bg-black border-zinc-900 text-zinc-700'}`}>{g === '男' ? '乾造' : '坤造'}</button>
                                            ))}
                                        </div>
                                        <div className="grid grid-cols-3 gap-4">
                                            <div className="bg-black p-4 rounded-xl border border-zinc-800 text-center"><label className="block text-[10px] text-zinc-700 mb-1">年份</label><input type="number" className="w-full bg-transparent font-bold text-amber-500 text-2xl text-center outline-none" value={form.year} onChange={e => setForm({...form, year: e.target.value})} /></div>
                                            <div className="bg-black p-4 rounded-xl border border-zinc-800 text-center"><label className="block text-[10px] text-zinc-700 mb-1">月份</label><select className="w-full bg-transparent font-bold text-amber-100 text-xl appearance-none outline-none" value={form.month} onChange={e => setForm({...form, month: e.target.value})}>{Array.from({length: 12}, (_, i) => i + 1).map(m => <option key={m} value={m}>{m}</option>)}</select></div>
                                            <div className="bg-black p-4 rounded-xl border border-zinc-800 text-center"><label className="block text-[10px] text-zinc-700 mb-1">日期</label><select className="w-full bg-transparent font-bold text-amber-100 text-xl appearance-none outline-none" value={form.day} onChange={e => setForm({...form, day: e.target.value})}>{Array.from({length: 31}, (_, i) => i + 1).map(d => <option key={d} value={d}>{d}</option>)}</select></div>
                                        </div>
                                        <div className="grid grid-cols-4 gap-2">
                                            {["子時", "丑時", "寅時", "卯時", "辰時", "巳時", "午時", "未時", "申時", "酉時", "戌時", "亥時"].map(s => (
                                                <button key={s} onClick={() => setForm({...form, hour: s})} className={`py-3 rounded-xl text-[11px] font-black border transition-all ${form.hour === s ? 'bg-amber-600 text-black border-amber-400 scale-105' : 'bg-black/40 border-zinc-900 text-zinc-700'}`}>{s}</button>
                                            ))}
                                        </div>
                                    </div>

                                    <button onClick={handleAction} disabled={!form.name || isSpinning} className={`w-full mt-10 py-6 rounded-3xl font-black tracking-widest text-lg shadow-2xl transition-all ${(!form.name || isSpinning) ? 'bg-zinc-900 text-zinc-800 cursor-not-allowed' : 'bg-gradient-to-r from-amber-600 via-amber-400 to-amber-600 text-black active:scale-95'}`}>
                                        {isSpinning ? "申 奏 中..." : "定 格 分 發"}
                                    </button>
                                </div>

                                <div className="space-y-6 pt-10 border-t border-zinc-900">
                                    <h3 className="text-zinc-600 font-bold text-xs uppercase tracking-widest">近期存簿紀錄</h3>
                                    {history.length === 0 ? <p className="text-zinc-800 italic text-sm text-center py-4">目前尚無紀錄</p> : 
                                        history.map(r => (
                                            <div key={r.id} onClick={() => {setResult(r); setTab('result');}} className="bg-[#0a0a0a] p-5 rounded-2xl border border-zinc-900 flex justify-between items-center shadow-lg active:scale-[0.98]">
                                                <div className="flex items-center space-x-5"><div className="w-10 h-10 bg-black rounded-lg flex items-center justify-center text-amber-500 border border-amber-900/10 text-xl font-bold">籙</div><div><h4 className="text-amber-100 font-bold text-lg">{r.name}</h4><p className="text-xs text-zinc-600 uppercase tracking-widest">{r.jiazi}年 • {r.marshal}</p></div></div>
                                                <ChevronRight className="text-zinc-800" size={20} />
                                            </div>
                                        ))
                                    }
                                </div>
                            </div>
                        )}

                        {tab === 'result' && result && (
                            <div className="animate-in zoom-in-95 duration-700 px-1 pb-20">
                                <div className="relative p-1.5 bg-[#0a0a0a] rounded-3xl overflow-hidden shadow-2xl border border-amber-900/30">
                                    <div className="absolute inset-0 bg-gradient-to-tr from-amber-600/30 via-amber-200/40 to-amber-900/30 animate-pulse pointer-events-none"></div>
                                    <div className="bg-[#050505] p-10 relative rounded-2xl border border-amber-600/20">
                                        <div className="text-center mb-16 border-b border-amber-900/20 pb-16">
                                            <div className="inline-block px-12 py-2 border border-amber-600/40 mb-10"><span className="text-amber-500 font-black tracking-widest text-xs uppercase italic">萬法宗壇</span></div>
                                            <h2 className="text-4xl font-black text-amber-100 tracking-widest drop-shadow-2xl font-serif">職官分發告牒</h2>
                                        </div>

                                        <div className="space-y-20 font-serif relative z-10">
                                            <div className="space-y-16 leading-relaxed text-zinc-300">
                                                <p className="flex flex-col space-y-4"><span className="text-amber-600 font-black text-sm tracking-widest opacity-60 italic">一 奏 受</span><span className="text-2xl font-black text-white pl-6 border-l-2 border-amber-900/50 py-2 leading-loose tracking-widest">太上三五都功經籙{result.fullRole}</span></p>
                                                <p className="flex flex-col space-y-4"><span className="text-amber-600 font-black text-sm tracking-widest opacity-60 italic">一 補 充</span><span className="text-xl font-bold text-zinc-200 pl-6 border-l-2 border-amber-900/50 py-2 tracking-widest">知天曹紀錄司黃{result.dt}為任</span></p>
                                                <p className="flex flex-col space-y-4"><span className="text-amber-600 font-black text-sm tracking-widest opacity-60 italic">一 奏 立</span><span className="text-xl font-bold text-zinc-200 pl-6 border-l-2 border-amber-900/50 py-2 tracking-widest">{result.al}{result.jn}</span></p>
                                                <p className="flex flex-col space-y-4"><span className="text-amber-600 font-black text-sm tracking-widest opacity-60 italic">一 泰玄都省正一平炁宮</span><span className="text-xl font-bold text-zinc-200 pl-6 border-l-2 border-amber-900/50 py-2 tracking-widest">係 天師{result.zh}治{result.dl}都領炁</span></p>
                                                
                                                <div className="bg-[#0a0a0a] p-8 rounded-3xl border border-zinc-900 shadow-inner">
                                                    <div className="text-[10px] text-zinc-700 uppercase tracking-widest mb-6 italic opacity-50">元命炁數 / 星君守護</div>
                                                    <p className="text-amber-500 font-black text-xl leading-loose tracking-widest">{result.hl.qi}炁君{result.hl.planet}三五步罡元命應暢玄先生<br/>{result.hl.side}{result.hl.emperor}{result.hl.qi}炁真人<br/>配屬本命北斗{result.st}星君</p>
                                                </div>

                                                <p className="flex flex-col space-y-6 pt-12 border-t border-zinc-900/50"><span className="text-amber-600 font-black text-sm tracking-widest uppercase opacity-60 italic">一 奏 撥</span><span className="text-3xl font-black text-amber-100 pl-6 py-4 drop-shadow-xl tracking-widest leading-normal">{result.prefix}{result.marshal}麾下</span></p>
                                            </div>

                                            <div className="text-center text-amber-900/40 font-sans text-xs mt-24 border-t border-zinc-900/50 pt-10 tracking-[0.5em] italic">核於 {result.timeStr} • 萬神咸聽</div>
                                        </div>

                                        <div className="mt-48 flex flex-col space-y-6 no-print">
                                            <button onClick={() => window.print()} className="w-full bg-gradient-to-b from-amber-500 to-amber-700 text-black py-7 rounded-3xl font-black text-2xl active:scale-95 shadow-2xl">列 印 牒 文</button>
                                            <button onClick={() => setTab('home')} className="w-full bg-zinc-900/50 text-zinc-600 py-6 rounded-3xl font-black text-sm active:scale-95 tracking-widest italic border border-zinc-900">返回登錄</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {tab === 'catalog' && (
                            <div className="space-y-12 animate-in slide-in-from-right duration-500 pb-40">
                                <h2 className="text-3xl font-black italic border-l-8 border-amber-600 pl-10 tracking-widest text-amber-100">法統全錄映射</h2>
                                <div className="relative group px-2">
                                    <input className="w-full bg-black border border-zinc-900 rounded-[3rem] py-8 pl-10 pr-10 font-bold text-amber-50 shadow-2xl outline-none focus:border-amber-600 text-2xl" placeholder="搜尋年份/甲子..." value={catalogQuery} onChange={e => setCatalogQuery(e.target.value)} />
                                </div>
                                <div className="bg-[#0a0a0a] rounded-[4rem] border border-zinc-800 p-8 shadow-2xl">
                                    <div className="grid grid-cols-2 gap-8 h-[75vh] overflow-y-auto custom-scrollbar px-2">
                                        {JIAZI_60.map((name, index) => {
                                            if (catalogQuery && !name.includes(catalogQuery)) return null;
                                            const m = MARSHAL_CANON[getMarshalIdx(index)];
                                            const isGroup = index % 4 === 0;
                                            return (
                                                <div key={name} className={`bg-zinc-950/40 p-8 rounded-[4rem] border border-zinc-900/60 flex flex-col items-center space-y-4 group active:bg-amber-950/20 transition-all ${isGroup ? 'border-l-4 border-l-amber-600/50' : ''}`}>
                                                    <div className="flex justify-between w-full px-3 items-center">
                                                        <span className="text-xs font-black text-zinc-800 italic">#{m.rank}</span>
                                                        <span className="font-black text-2xl text-zinc-400 group-hover:text-amber-100">{name}</span>
                                                    </div>
                                                    <div className="text-center font-serif pt-4 border-t border-zinc-900/50 w-full">
                                                        <span className="block font-black text-amber-600 italic text-2xl tracking-tighter uppercase">{m.name}</span>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Footer Navigation */}
                    <nav className="fixed bottom-0 left-0 right-0 bg-black/95 backdrop-blur-3xl border-t border-amber-900/20 p-12 pb-14 z-50 max-w-md mx-auto rounded-t-[5rem] shadow-2xl no-print">
                        <div className="flex justify-around items-center">
                            <button onClick={() => setTab('home')} className={`flex flex-col items-center space-y-3 px-12 transition-all relative ${tab === 'home' || tab === 'result' ? 'text-amber-400 scale-125' : 'text-zinc-700'}`}>錄籍</button>
                            <button onClick={() => setTab('catalog')} className={`flex flex-col items-center space-y-3 px-12 transition-all relative ${tab === 'catalog' ? 'text-amber-400 scale-125' : 'text-zinc-700'}`}>全錄</button>
                        </div>
                    </nav>
                </div>
            );
        }

        // 啟動 React
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        // 初始化 Lucide 圖標
        setTimeout(() => lucide.createIcons(), 500);
    </script>
</body>
</html>
