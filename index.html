            "江河潤澤事": "權限：主管水資源分配，修復乾渴大地靈氣，主理生態與降雨計畫。",
            "濟度沉淪事": "權限：拯救落入無明、恐懼或深淵中的靈魂，將其拉回修行正軌。",
            "妖邪掃除事": "權限：純粹的戰鬥職能。負責全面清理、消滅破壞秩序的負面能量體。",
            "金石鑄造事": "權限：監督法器、符圖製作。將物質精煉為具備靈壓的法寶。",
            "厚德載物事": "權限：提升基地的承載能量上限，使環境能容納更多福分，穩固事業。",
            "考校功過事": "權限：負責對眾生進行公平的績效核算，決定後續福報或磨煉分配。",
            "甲兵操練事": "權限：負責提升麾下神兵的作戰意志，確保法師行法時戰力充沛。",
            "五金司掌事": "權限：管理金屬資源。負責維持秩序中的強硬、不可動搖部分。",
            "五雷風火事": "權限：調動綜合自然能量進行大面積淨化與環境重塑任務。",
            "玄通感應事": "權限：提升法師與高層神明的通訊頻寬，增加法事感應速度。",
            "山嶽鎮守事": "權限：維護山川大地的氣運節點，防止大型龍脈能量流失。",
            "恆久法界事": "權限：負責保護修行的核心種子，確保法脈與法力不受歲月剝削。",
            "三教並圓事": "權限：處理跨領域宗教與文化能量的和諧與共融事項。",
            "施予福報事": "權限：具備撥發實體財運、福氣與好運的審核權限。",
            "伏虎降龍事": "權限：降伏內在慾念與外在狂暴邪能，控制極端強大能量的能力。",
            "易理推衍事": "權限：分析局勢動能變化，預測未來趨向並優化現實路徑。",
            "九天震動事": "權限：發出強烈靈魂聲波，喚醒沉睡良知，嚇退一切邪魔。",
            "西方肅殺事": "權限：行使金氣力量，果斷切斷不必要的惡緣與負面糾纏。",
            "遁法施行事": "權限：管理避難、隱藏或快速撤收術法，在危難時刻保護目標。",
            "天門手衛事": "權限：負責天壇、天門與重要維度的守護任務，嚴防非授權能量擅闖。",
            "群仙考較事": "權限：負責對區域內的所有神靈、地靈進行績效考核的司法審核權。"
        };
        


        // --- 辭典結構數據 (用於渲染) ---
        const DICTIONARY_DATA = [
            { category: "行政編制 (官銜全譯)", id: "rolePrefix", icon: "Award", items: Object.entries(ROLE_PREFIX_GLOSSARY).map(([term, meaning]) => ({ term, meaning })) },
            { category: "公署地址 (宮署全解)", id: "palace", icon: "Landmark", items: Object.entries(PALACE_GLOSSARY).map(([term, meaning]) => ({ term, meaning })) },
            { category: "行政職司 (職司詳解)", id: "office", icon: "Activity", items: Object.entries(OFFICE_GLOSSARY).map(([term, meaning]) => ({ term, meaning })) },
            { category: "監理職事 (職事詳解)", id: "duty", icon: "FileText", items: Object.entries(DUTY_GLOSSARY).map(([term, meaning]) => ({ term, meaning })) }
        ];

        const getMarshalIdxByOffset = (off) => {
            const g = Math.floor(off / 4);
            if (off >= 48) return (18 + (g - 12)) % 43; 
            if (g >= 3 && off < 48) return (1 + g + 1) % 43; 
            return (1 + g) % 43; 
        };

        // ==========================================
        // 第二區塊：SVG 圖示組件
        // ==========================================

        const Icon = ({ name, className = "w-6 h-6", size = 24 }) => {
            const paths = {
                Scroll: "M8 21h12a2 2 0 0 0 2-2v-2H10v2a2 2 0 1 1-4 0V5a2 2 0 1 0-4 0v3h4",
                BookOpen: "M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2zm20 0h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z",
                Menu: "M4 6h16M4 12h16M4 18h16",
                HelpCircle: "M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10zm0-15v2m0 4h.01",
                Activity: "M22 12h-4l-3 9L9 3l-3 9H2",
                Search: "M11 19a8 8 0 1 0 0-16 8 8 0 0 0 0 16zm10 2l-4.35-4.35",
                Award: "M12 15l-2 5 2-1 2 1-2-5zm0 0l-3-1.5L6 15l3-4.5L12 9l3 1.5 3 4.5-3 1.5L12 15z",
                Landmark: "M3 22h18M6 18v-7m5 7v-7m5 7v-7M3 11l9-7 9 7M10 22v-4h4v4",
                FileText: "M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    <path d={paths[name] || "M12 2v20M2 12h20"} />
                </svg>
            );
        };

        // ==========================================
        // 第三區塊：子組件定義
        // ==========================================

        const Navigation = ({ activeTab, setTab }) => (
            <nav className="fixed bottom-0 left-0 right-0 bg-black/95 backdrop-blur-3xl border-t border-amber-900/20 p-4 pb-8 z-50 max-w-md mx-auto rounded-t-[2.5rem] shadow-2xl no-print">
                <div className="flex justify-around items-center px-4 font-sans text-[11px] font-black">
                    <button onClick={() => setTab('home')} className={`flex flex-col items-center space-y-1 px-4 py-2 transition-all ${activeTab === 'home' || activeTab === 'result' ? 'text-amber-400 scale-110' : 'text-zinc-700 opacity-60'}`}>
                        <Icon name="Scroll" size={20}/><span>登記</span>
                    </button>
                    <button onClick={() => setTab('explanation')} className={`flex flex-col items-center space-y-1 px-4 py-2 transition-all ${activeTab === 'explanation' ? 'text-amber-400 scale-110' : 'text-zinc-700 opacity-60'}`}>
                        <Icon name="HelpCircle" size={20}/><span>詞典</span>
                    </button>
                    <button onClick={() => setTab('catalog')} className={`flex flex-col items-center space-y-1 px-4 py-2 transition-all ${activeTab === 'catalog' ? 'text-amber-400 scale-110' : 'text-zinc-700 opacity-60'}`}>
                        <Icon name="BookOpen" size={20}/><span>元帥</span>
                    </button>
                </div>
            </nav>
        );

        const HomeView = ({ form, setForm, onAction, isSpinning, error }) => (
            <div className="space-y-8 animate-in fade-in duration-500 font-sans">
                <div className="bg-[#0a0a0a] rounded-2xl p-6 border border-zinc-900 shadow-2xl text-zinc-300 text-left">
                    <div className="flex justify-between items-center mb-6 border-b border-zinc-900 pb-4 text-center">
                        <span className="tracking-widest text-amber-100 uppercase italic font-black flex items-center gap-2"><Icon name="Activity" size={14}/> 錄 籍 申 奏</span>
                        <div className="flex bg-black p-0.5 rounded-lg border border-zinc-800">
                            {['solar', 'lunar'].map(m => (
                                <button key={m} onClick={() => setForm({...form, calendar: m})} className={`px-4 py-1.5 rounded-md transition-all text-[10px] font-black ${form.calendar === m ? 'bg-amber-900 text-white' : 'text-zinc-700'}`}>{m === 'solar' ? '國曆' : '農曆'}</button>
                            ))}
                        </div>
                    </div>
                    <div className="space-y-6">
                        <div className="space-y-1">
                            <label className="font-black text-zinc-600 uppercase tracking-widest text-[11px]">受職弟子姓名</label>
                            <input className="w-full bg-black border border-zinc-800 rounded-xl py-4 px-5 font-bold text-amber-50 outline-none focus:border-amber-600 shadow-inner text-lg" placeholder="姓名" value={form.name} onChange={e => setForm({...form, name: e.target.value})} />
                        </div>
                        <div className="grid grid-cols-2 gap-4 font-black text-sm text-center">
                            {['男生', '女生'].map(g => (
                                <button key={g} onClick={() => setForm({...form, gender: g})} className={`py-4 rounded-xl border transition-all ${form.gender === g ? 'bg-amber-950/40 border-amber-600 text-amber-100 shadow-xl' : 'bg-black border-zinc-900 text-zinc-700'}`}>{g === '男生' ? '乾造 (男)' : '坤造 (女)'}</button>
                            ))}
                        </div>
                        <div className="grid grid-cols-3 gap-3 text-center font-black">
                            <div className="bg-black p-3 rounded-xl border border-zinc-800"><label className="block text-zinc-700 mb-1 text-[10px] uppercase">元辰(年)</label><input type="number" className="w-full bg-transparent text-amber-500 text-center outline-none font-bold text-xl" value={form.year} onChange={e => setForm({...form, year: e.target.value})} /></div>
                            <div className="bg-black p-3 rounded-xl border border-zinc-800"><label className="block text-zinc-700 mb-1 text-[10px]">月份</label><select className="w-full bg-transparent font-bold text-amber-100 outline-none text-center text-xl" value={form.month} onChange={e => setForm({...form, month: e.target.value})}>{Array.from({length: 12}, (_, i) => i + 1).map(m => <option key={m} value={m} className="bg-black">{m}月</option>)}</select></div>
                            <div className="bg-black p-3 rounded-xl border border-zinc-800"><label className="block text-zinc-700 mb-1 text-[10px]">日期</label><select className="w-full bg-transparent font-bold text-amber-100 outline-none text-center text-xl" value={form.day} onChange={e => setForm({...form, day: e.target.value})}>{Array.from({length: 31}, (_, i) => i + 1).map(d => <option key={d} value={d} className="bg-black">{d}日</option>)}</select></div>
                        </div>
                        <div className="grid grid-cols-4 gap-2 font-black text-[11px]">
                            {Object.keys(HOUR_MESSENGERS).map(s => (
                                <button key={s} onClick={() => setForm({...form, hour: s})} className={`py-3 rounded-xl border transition-all ${form.hour === s ? 'bg-amber-600 text-black border-amber-400 scale-105' : 'bg-black/40 border-zinc-900 text-zinc-700'}`}>{s}</button>
                            ))}
                        </div>
                        {error && (
                            <div className="mt-2 p-4 rounded-xl border border-amber-900/50 bg-amber-950/30 text-amber-300 text-sm font-bold shadow-inner">
                                {error}
                            </div>
                        )}
                    </div>
                    <button onClick={onAction} disabled={!form.name || isSpinning} className={`w-full mt-10 py-5 rounded-2xl tracking-[0.4em] font-black text-base transition-all shadow-2xl ${(!form.name || isSpinning) ? 'bg-zinc-900 text-zinc-800' : 'bg-gradient-to-r from-amber-600 via-amber-400 to-amber-600 text-black active:scale-95'}`}>
                        {isSpinning ? "正 在 核 定..." : "定 格 分 發 職 官"}
                    </button>
                </div>
            </div>
        );

        // ==========================================
        // 主程式組件
        // ==========================================

        function App() {
            const [tab, setTab] = useState('home');
            const [menuOpen, setMenuOpen] = useState(false);
            const [glossaryCategory, setGlossaryCategory] = useState('rolePrefix'); 
            const [dictionarySearch, setDictionarySearch] = useState(''); 
            const [catalogQuery, setCatalogQuery] = useState(''); 
            const [form, setForm] = useState({ name: '', gender: '男生', calendar: 'solar', year: '1987', month: '4', day: '10', hour: '申時' });
            const [result, setResult] = useState(null);
            const [error, setError] = useState('');
            const [isSpinning, setIsSpinning] = useState(false);

            const filteredTerms = useMemo(() => {
                const currentGroup = DICTIONARY_DATA.find(g => g.id === glossaryCategory);
                if (!currentGroup) return [];
                return currentGroup.items.filter(item => 
                    item.term.includes(dictionarySearch) || item.meaning.includes(dictionarySearch)
                );
            }, [glossaryCategory, dictionarySearch]);

            const renderIcon = (iconName) => {
                const iconProps = { className: "text-amber-500", size: 20 };
                switch(iconName) {
                    case "Award": return <Icon name="Award" {...iconProps}/>;
                    case "Landmark": return <Icon name="Landmark" {...iconProps}/>;
                    case "Activity": return <Icon name="Activity" {...iconProps}/>;
                    case "FileText": return <Icon name="FileText" {...iconProps}/>;
                    default: return <Icon name="HelpCircle" {...iconProps}/>;
                }
            };

            const handleAction = () => {
                if (!form.name.trim()) return;
                setError('');
                setIsSpinning(true);
                setTimeout(() => {
                    try {
                        const yr = parseInt(form.year) || 1984;
                        const mon = parseInt(form.month) || 1;
                        const dayNum = parseInt(form.day) || 1;
                        const calendarOffset = form.calendar === 'solar' ? 2 : 0;
                        let off = (yr - 1984) % 60;
                        if (off < 0) off += 60;

                        const jiazi = JIAZI_60[off];
                        const marshalIdx = getMarshalIdxByOffset(off);
                        const m = MARSHAL_CANON[marshalIdx];
                        const hourMsg = HOUR_MESSENGERS[form.hour];

                        if (!jiazi || !m || !hourMsg) {
                            throw new Error('映射資料缺失');
                        }

                        const duling = YANG_HOURS.includes(form.hour) ? "左" : "右";
                        const hl = HELUO_MAPPING[jiazi[0]];
                        const monSpirit = MONTH_SPIRITS[(mon - 1 + calendarOffset) % 12];
                        const dayDuty = DAY_DUTIES[(dayNum - 1 + calendarOffset) % DAY_DUTIES.length];

                        setResult({
                            id: Date.now(), ...form, jiazi, marshal: m.name, prefix: m.prefix, rk: m.rank,
                            al: m.altar, jn: m.jing, zh: m.zhi, dt: m.duty, pl: m.palace, office: m.office, rolePrefix: m.rolePrefix,
                            st: STAR_MAPPING[jiazi[1]], hl, dl: duling, monSpirit, dayDuty, hourMsg,
                            fullRole: form.gender === '男生' ? `${m.rolePrefix}${m.palace}仙官之職` : `封受${m.palace}淑人之位`
                        });
                        setTab('result');
                    } catch (err) {
                        console.error(err);
                        setError('無法產生結果，請確認輸入是否完整或嘗試再次送出。');
                        setTab('home');
                    } finally {
                        setIsSpinning(false);
                    }
                }, 600);
            };

            const handleSavePDF = () => {
                const element = document.getElementById('ordination-certificate');
                if (!element) return;
                const opt = {
                    margin: [5, 5], 
                    filename: `萬法宗壇_職牒_${result.name}.pdf`,
                    image: { type: 'jpeg', quality: 1.0 },
                    html2canvas: { scale: 2, backgroundColor: '#050505' },
                    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
                };
                html2pdf().from(element).set(opt).save();
            };

            return (
                <div className="flex flex-col min-h-screen">
                    <header className="sticky top-0 z-50 bg-black/90 border-b border-amber-900/30 px-6 py-4 flex justify-between items-center shadow-xl no-print">
                        <button onClick={() => setMenuOpen(true)} className="p-2 text-amber-50 active:scale-75 transition-all"><Icon name="Menu" size={24}/></button>
                        <h1 className="tracking-widest text-amber-100 italic font-black text-base uppercase">正一職官法典系統</h1>
                        <button onClick={() => setTab('explanation')} className="p-2 text-amber-50"><Icon name="HelpCircle" size={24}/></button>
                    </header>

                    <main className="max-w-md mx-auto px-4 py-6 flex-1 w-full pb-24 text-center">
                        {tab === 'home' && <HomeView form={form} setForm={setForm} onAction={handleAction} isSpinning={isSpinning} error={error} />}
                        
                        {tab === 'explanation' && (
                            <div className="space-y-6 animate-in slide-in-from-right duration-500 font-sans text-left">
                                <h2 className="text-xl font-black text-amber-100 tracking-widest border-l-4 border-amber-600 pl-4 mb-8">法語辭典</h2>
                                <div className="relative mb-6">
                                    <Icon name="Search" size={18} className="absolute left-4 top-1/2 -translate-y-1/2 text-zinc-700" />
                                    <input className="w-full bg-black border border-zinc-900 rounded-xl py-4 pl-12 pr-4 font-bold text-amber-50 outline-none focus:border-amber-600" placeholder="搜尋術語..." value={dictionarySearch} onChange={e => setDictionarySearch(e.target.value)} />
                                </div>
                                <div className="flex overflow-x-auto gap-2 pb-2 mb-2 custom-scrollbar font-black">
                                    {DICTIONARY_DATA.map(g => (
                                        <button key={g.id} onClick={() => setGlossaryCategory(g.id)} className={`flex-shrink-0 px-4 py-2 rounded-full text-[10px] flex items-center gap-2 tab-btn ${glossaryCategory === g.id ? 'active' : 'text-zinc-600 bg-zinc-950 border border-zinc-900'}`}>{renderIcon(g.icon)} {g.category.split(' ')[0]}</button>
                                    ))}
                                </div>
                                <div className="space-y-3">
                                    {filteredTerms.length > 0 ? filteredTerms.map((item, i) => (
                                        <div key={i} className="glossary-card p-4 rounded-xl border-l-2 border-l-amber-600/40">
                                            <h4 className="text-amber-200 font-black mb-1">{item.term}</h4>
                                            <p className="text-zinc-400 text-xs leading-relaxed">{item.meaning}</p>
                                        </div>
                                    )) : <div className="py-20 text-center text-zinc-800 italic font-sans">無匹配條目</div>}
                                </div>
                            </div>
                        )}

                        {tab === 'result' && !result && (
                            <div className="text-center text-amber-200 py-12 font-sans">
                                尚未產生結果，請回到錄籍頁面重新送出資訊。
                                <div className="mt-4">
                                    <button onClick={() => setTab('home')} className="px-4 py-2 rounded-lg bg-amber-700 text-black font-black shadow-lg active:scale-95">
                                        回到錄籍
                                    </button>
                                </div>
                            </div>
                        )}

                        {tab === 'result' && result && <ResultView result={result} setTab={setTab} onSavePDF={handleSavePDF} />}

                        {tab === 'catalog' && (
                            <div className="animate-in slide-in-from-right duration-500 font-sans text-zinc-300">
                                <h2 className="text-xl font-black text-amber-100 tracking-widest border-l-4 border-amber-600 pl-4 mb-6 text-left">元帥全錄</h2>
                                <div className="relative mb-6">
                                    <Icon name="Search" size={18} className="absolute left-4 top-1/2 -translate-y-1/2 text-zinc-700" />
                                    <input className="w-full bg-black border border-zinc-900 rounded-xl py-4 pl-12 pr-4 font-bold text-amber-50 outline-none focus:border-amber-600" placeholder="搜尋..." value={catalogQuery} onChange={e => setCatalogQuery(e.target.value)} />
                                </div>
                                <div className="grid grid-cols-2 gap-3 h-[70vh] overflow-y-auto custom-scrollbar">
                                    {JIAZI_60.map((name, index) => {
                                        const m = MARSHAL_CANON[getMarshalIdxByOffset(index)];
                                        if (catalogQuery && !m.name.includes(catalogQuery)) return null;
                                        return (
                                            <div key={index} className="bg-zinc-950 p-4 rounded-xl border border-zinc-900">
                                                <span className="text-zinc-600 text-[10px] block font-black font-sans">#{m.rank}</span>
                                                <span className="text-amber-600 font-black italic font-serif">{m.name}</span>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        )}
                    </main>
                    <Navigation activeTab={tab} setTab={setTab} />
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
